<!doctype html><html><body>
<form>
  <label>First Name <input name="first_name"></label>
  <label>Last Name <input id="lastName"></label>
  <label>Email Address <input type="email" name="email"></label>
  <label>Phone <input name="phone" placeholder="Mobile phone"></label>
  <label>Current Location <input name="loc" aria-label="City and State"></label>
  <label>LinkedIn Profile <input name="linkedin_url"></label>
  <label>Are you legally authorized to work in the United States? <input name="q_auth"></label>
  <label>Will you now or in the future require sponsorship? <input name="q_sponsor"></label>
  <label>Desired Salary <input name="comp"></label>
  <label>Resume <input type="file" name="resume"></label>
  <button type="submit">Submit application</button>
</form>
</body></html>
